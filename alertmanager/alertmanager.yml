global:
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'monitoring@yourdomain.com'
  smtp_auth_username: 'monitoring@yourdomain.com'
  smtp_auth_password: 'your-app-password-here'
  smtp_require_tls: true
  resolve_timeout: 5m

# routing tree - critical alerts go to pagerduty/slack immediately
# warnings get grouped and sent via email with a 10 min delay
route:
  group_by: ['alertname', 'instance', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: email-notifications

  routes:
    - match:
        severity: critical
      receiver: critical-alerts
      group_wait: 0s
      repeat_interval: 1h

    - match:
        severity: warning
      receiver: email-notifications
      group_wait: 10m
      repeat_interval: 6h

    - match:
        category: sla
      receiver: critical-alerts
      group_wait: 0s

receivers:
  - name: email-notifications
    email_configs:
      - to: 'admin@yourdomain.com'
        send_resolved: true
        headers:
          Subject: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }} - {{ .GroupLabels.instance }}'
        html: |
          <h2>Alert: {{ .GroupLabels.alertname }}</h2>
          {{ range .Alerts }}
          <p><strong>Instance:</strong> {{ .Labels.instance }}</p>
          <p><strong>Severity:</strong> {{ .Labels.severity }}</p>
          <p><strong>Summary:</strong> {{ .Annotations.summary }}</p>
          <p><strong>Description:</strong> {{ .Annotations.description }}</p>
          <p><strong>Started:</strong> {{ .StartsAt }}</p>
          {{ end }}

  - name: critical-alerts
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        channel: '#alerts-critical'
        send_resolved: true
        title: '{{ if eq .Status "firing" }}:red_circle:{{ else }}:large_green_circle:{{ end }} [{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Instance:* {{ .Labels.instance }}
          *Severity:* {{ .Labels.severity }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          {{ end }}
    email_configs:
      - to: 'admin@yourdomain.com'
        send_resolved: true
        headers:
          Subject: '[CRITICAL] {{ .GroupLabels.alertname }} - Action Required'

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['instance', 'alertname']
