global:
  scrape_interval: 30s
  evaluation_interval: 30s
  scrape_timeout: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  # prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  # node exporter - system metrics from all linux hosts
  - job_name: node-exporter
    static_configs:
      - targets:
          - 10.10.20.10:9100
          - 10.10.10.1:9100
          - 10.10.10.2:9100
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+).*'
        replacement: '${1}'

  # blackbox exporter - icmp probes for uptime/sla tracking
  # this is what feeds the SLA breach alert rules
  - job_name: blackbox-icmp
    metrics_path: /probe
    params:
      module:
        - icmp
    static_configs:
      - targets:
          - 10.10.10.1
          - 10.10.10.2
          - 10.10.20.1
          - 10.10.20.10
          - 10.10.30.1
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # wazuh agent metrics - scraped from node exporter on siem host
  - job_name: wazuh
    static_configs:
      - targets:
          - 10.10.20.10:9100
    labels:
      role: siem

  # snmp exporter - network device metrics via snmp
  # requires snmp community string configured on cisco switches
  - job_name: snmp-network
    metrics_path: /snmp
    params:
      module:
        - if_mib
    static_configs:
      - targets:
          - 10.10.10.1
          - 10.10.10.2
          - 10.10.20.1
          - 10.10.30.1
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: snmp-exporter:9116
