global:
  scrape_interval: 30s
    evaluation_interval: 30s
      scrape_timeout: 10s

      alerting:
        alertmanagers:
            - static_configs:
                    - targets:
                                - alertmanager:9093

                                rule_files:
                                  - /etc/prometheus/alert-rules.yml

                                  scrape_configs:

                                    # prometheus self-monitoring
                                      - job_name: prometheus
                                          static_configs:
                                                - targets:
                                                          - localhost:9090

                                                            # linux host metrics via node exporter
                                                              - job_name: node-exporter
                                                                  static_configs:
                                                                        - targets:
                                                                                  - node-exporter:9100
                                                                                            - 192.168.10.10:9100 # web-server-01
                                                                                                      - 192.168.10.11:9100 # web-server-02
                                                                                                                - 192.168.10.20:9100 # db-server-01
                                                                                                                          - 192.168.10.30:9100 # monitoring host itself
                                                                                                                              relabel_configs:
                                                                                                                                    - source_labels: [__address__]
                                                                                                                                            target_label: instance
                                                                                                                                            
                                                                                                                                              # icmp availability probes via blackbox exporter
                                                                                                                                                # this drives the uptime SLA panels in grafana
                                                                                                                                                  - job_name: blackbox-icmp
                                                                                                                                                      metrics_path: /probe
                                                                                                                                                          params:
                                                                                                                                                                module: [icmp]
                                                                                                                                                                    static_configs:
                                                                                                                                                                          - targets:
                                                                                                                                                                                    - 192.168.10.1  # core-switch-01
                                                                                                                                                                                              - 192.168.10.2  # core-switch-02
                                                                                                                                                                                                        - 192.168.10.3  # dist-switch-01
                                                                                                                                                                                                                  - 192.168.10.4  # edge-router-01
                                                                                                                                                                                                                            - 192.168.10.10 # web-server-01
                                                                                                                                                                                                                                      - 192.168.10.20 # db-server-01
                                                                                                                                                                                                                                          relabel_configs:
                                                                                                                                                                                                                                                - source_labels: [__address__]
                                                                                                                                                                                                                                                        target_label: __param_target
                                                                                                                                                                                                                                                              - source_labels: [__param_target]
                                                                                                                                                                                                                                                                      target_label: instance
                                                                                                                                                                                                                                                                            - target_label: __address__
                                                                                                                                                                                                                                                                                    replacement: blackbox-exporter:9115
                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                      # snmpv3 scrape for cisco switches and routers
                                                                                                                                                                                                                                                                                        # using IF-MIB for interface stats and CISCO-PROCESS-MIB for CPU/memory
                                                                                                                                                                                                                                                                                          - job_name: snmp-cisco
                                                                                                                                                                                                                                                                                              metrics_path: /snmp
                                                                                                                                                                                                                                                                                                  params:
                                                                                                                                                                                                                                                                                                        module: [if_mib]
                                                                                                                                                                                                                                                                                                            static_configs:
                                                                                                                                                                                                                                                                                                                  - targets:
                                                                                                                                                                                                                                                                                                                            - 192.168.10.1  # core-switch-01
                                                                                                                                                                                                                                                                                                                                      - 192.168.10.2  # core-switch-02
                                                                                                                                                                                                                                                                                                                                                - 192.168.10.3  # dist-switch-01
                                                                                                                                                                                                                                                                                                                                                          - 192.168.10.4  # edge-router-01
                                                                                                                                                                                                                                                                                                                                                              relabel_configs:
                                                                                                                                                                                                                                                                                                                                                                    - source_labels: [__address__]
                                                                                                                                                                                                                                                                                                                                                                            target_label: __param_target
                                                                                                                                                                                                                                                                                                                                                                                  - source_labels: [__param_target]
                                                                                                                                                                                                                                                                                                                                                                                          target_label: instance
                                                                                                                                                                                                                                                                                                                                                                                                - target_label: __address__
                                                                                                                                                                                                                                                                                                                                                                                                        replacement: snmp-exporter:9116
                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                          # alertmanager self-monitoring
                                                                                                                                                                                                                                                                                                                                                                                                            - job_name: alertmanager
                                                                                                                                                                                                                                                                                                                                                                                                                static_configs:
                                                                                                                                                                                                                                                                                                                                                                                                                      - targets:
                                                                                                                                                                                                                                                                                                                                                                                                                                - alertmanager:9093
