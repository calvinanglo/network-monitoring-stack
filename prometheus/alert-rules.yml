groups:

  - name: availability
      rules:

            # device unreachable via icmp - sla impact, page immediately
                  - alert: DeviceUnreachable
                          expr: probe_success{job="blackbox-icmp"} == 0
                                  for: 2m
                                          labels:
                                                    severity: critical
                                                              category: availability
                                                                      annotations:
                                                                                summary: "Device {{ $labels.instance }} is unreachable"
                                                                                          description: "ICMP probe has failed for 2 consecutive minutes. SLA uptime timer is now running. Acknowledge in alertmanager and open incident ticket."

                                                                                                # sla breach warning - device was down > 43 min in last 30 days (99.9% threshold)
                                                                                                      - alert: SLABreachWarning
                                                                                                              expr: |
                                                                                                                        (1 - avg_over_time(probe_success{job="blackbox-icmp"}[30d])) * 100 > 0.1
                                                                                                                                for: 0m
                                                                                                                                        labels:
                                                                                                                                                  severity: warning
                                                                                                                                                            category: sla
                                                                                                                                                                    annotations:
                                                                                                                                                                              summary: "SLA breach risk on {{ $labels.instance }}"
                                                                                                                                                                                        description: "30-day availability has dropped below 99.9% target. Review incident history and update SLA report."
                                                                                                                                                                                        
                                                                                                                                                                                          - name: interface-utilization
                                                                                                                                                                                              rules:
                                                                                                                                                                                              
                                                                                                                                                                                                    # interface utilization over 70% - warning tier
                                                                                                                                                                                                          - alert: InterfaceHighUtilization
                                                                                                                                                                                                                  expr: |
                                                                                                                                                                                                                            (rate(ifHCInOctets[5m]) + rate(ifHCOutOctets[5m])) * 8 / ifHighSpeed / 1000000 > 70
                                                                                                                                                                                                                                    for: 5m
                                                                                                                                                                                                                                            labels:
                                                                                                                                                                                                                                                      severity: warning
                                                                                                                                                                                                                                                                category: capacity
                                                                                                                                                                                                                                                                        annotations:
                                                                                                                                                                                                                                                                                  summary: "High utilization on {{ $labels.instance }} interface {{ $labels.ifDescr }}"
                                                                                                                                                                                                                                                                                            description: "Interface utilization above 70% for 5 minutes. Check for traffic spike or misconfigured trunk. Current: {{ $value | printf \"%.1f\" }}%"
                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                  # interface utilization over 90% - critical, likely impacting services
                                                                                                                                                                                                                                                                                                        - alert: InterfaceCriticalUtilization
                                                                                                                                                                                                                                                                                                                expr: |
                                                                                                                                                                                                                                                                                                                          (rate(ifHCInOctets[5m]) + rate(ifHCOutOctets[5m])) * 8 / ifHighSpeed / 1000000 > 90
                                                                                                                                                                                                                                                                                                                                  for: 2m
                                                                                                                                                                                                                                                                                                                                          labels:
                                                                                                                                                                                                                                                                                                                                                    severity: critical
                                                                                                                                                                                                                                                                                                                                                              category: capacity
                                                                                                                                                                                                                                                                                                                                                                      annotations:
                                                                                                                                                                                                                                                                                                                                                                                summary: "Critical utilization on {{ $labels.instance }} interface {{ $labels.ifDescr }}"
                                                                                                                                                                                                                                                                                                                                                                                          description: "Interface at {{ $value | printf \"%.1f\" }}% utilization. Service degradation likely. Escalate to network team."
                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                # interface flapping - went down then came back, but worth investigating
                                                                                                                                                                                                                                                                                                                                                                                                      - alert: InterfaceFlapping
                                                                                                                                                                                                                                                                                                                                                                                                              expr: changes(ifOperStatus[10m]) > 2
                                                                                                                                                                                                                                                                                                                                                                                                                      for: 0m
                                                                                                                                                                                                                                                                                                                                                                                                                              labels:
                                                                                                                                                                                                                                                                                                                                                                                                                                        severity: warning
                                                                                                                                                                                                                                                                                                                                                                                                                                                  category: availability
                                                                                                                                                                                                                                                                                                                                                                                                                                                          annotations:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    summary: "Interface flapping on {{ $labels.instance }} {{ $labels.ifDescr }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              description: "Interface changed state more than 2 times in 10 minutes. Could be physical layer issue or STP instability."
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - name: host-resources
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    rules:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          # linux host cpu high - warning at 75%
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - alert: HostCPUHigh
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 75
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                for: 5m
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        labels:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  severity: warning
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            category: performance
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    annotations:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              summary: "High CPU on {{ $labels.instance }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        description: "CPU usage at {{ $value | printf \"%.1f\" }}% for 5 minutes. Check top/htop for runaway processes."
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              # linux host cpu critical - 90% sustained
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - alert: HostCPUCritical
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    for: 2m
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            labels:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      severity: critical
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                category: performance
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        annotations:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  summary: "Critical CPU on {{ $labels.instance }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            description: "CPU usage at {{ $value | printf \"%.1f\" }}%. System may become unresponsive. Immediate investigation required."
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  # disk space getting low - warn at 80%
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - alert: HostDiskSpaceWarning
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                expr: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          (node_filesystem_size_bytes{fstype!~"tmpfs|overlay"} - node_filesystem_free_bytes{fstype!~"tmpfs|overlay"})
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"} * 100 > 80
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            for: 10m
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    labels:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              severity: warning
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        category: capacity
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                annotations:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          summary: "Disk space low on {{ $labels.instance }} ({{ $labels.mountpoint }})"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    description: "Filesystem {{ $labels.mountpoint }} is {{ $value | printf \"%.1f\" }}% full. Clean up logs or expand volume."
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          # memory pressure - less than 10% available
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - alert: HostMemoryLow
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        expr: node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes * 100 < 10
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                for: 5m
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        labels:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  severity: warning
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            category: performance
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    annotations:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              summary: "Low memory on {{ $labels.instance }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        description: "Available memory is {{ $value | printf \"%.1f\" }}% of total. Check for memory leaks."
